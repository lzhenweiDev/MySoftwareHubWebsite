<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soft Repo · lzhenwei.dev</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
    
    :root {
      --primary: #8b5cf6;
      --primary-dark: #6d28d9;
      --primary-light: #a78bfa;
      --primary-glow: rgba(139, 92, 246, 0.3);
      --bg-deep: #030712;
      --bg-card: rgba(30, 27, 75, 0.3);
      --bg-card-hover: rgba(30, 27, 75, 0.5);
      --border-color: rgba(139, 92, 246, 0.3);
      --text-primary: #ede9fe;
      --text-secondary: #c4b5fd;
      --text-muted: #a78bfa;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --info: #3b82f6;
      --transition-fast: 0.2s ease;
      --transition-normal: 0.3s ease;
      --transition-slow: 0.5s ease;
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.2);
      --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.3);
      --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.4);
      --shadow-glow: 0 0 30px var(--primary-glow);
      --radius-sm: 12px;
      --radius-md: 20px;
      --radius-lg: 30px;
      --radius-xl: 60px;
    }
    
    body {
      background: radial-gradient(circle at 20% 30%, #1e1b4b 0%, #111827 50%, #030712 100%);
      min-height: 100vh;
      padding: 2rem;
      position: relative;
      overflow-x: hidden;
    }
    
    body::before {
      content: '';
      position: fixed;
      width: 300%;
      height: 300%;
      top: -100%;
      left: -100%;
      background: 
        radial-gradient(circle at 30% 40%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 70% 60%, rgba(109, 40, 217, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 50% 80%, rgba(167, 139, 250, 0.08) 0%, transparent 40%);
      animation: liquidMove 20s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }
    
    @keyframes liquidMove {
      0%, 100% { transform: translate(0, 0) rotate(0deg) scale(1); }
      15% { transform: translate(-1%, -0.5%) rotate(0.5deg) scale(1.02); }
      30% { transform: translate(-2%, -1%) rotate(1deg) scale(1.01); }
      45% { transform: translate(-1%, 0.5%) rotate(0.5deg) scale(1.03); }
      60% { transform: translate(1%, 1%) rotate(-0.5deg) scale(1.01); }
      75% { transform: translate(2%, 0.5%) rotate(-1deg) scale(1.02); }
      90% { transform: translate(1%, -0.5%) rotate(-0.5deg) scale(1); }
    }
    
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    
    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    @keyframes bounceIn {
      0% { transform: scale(0.3); opacity: 0; }
      50% { transform: scale(1.05); }
      70% { transform: scale(0.9); }
      100% { transform: scale(1); opacity: 1; }
    }
    
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    
    ::-webkit-scrollbar-track {
      background: rgba(30, 27, 75, 0.3);
      border-radius: 10px;
    }
    
    ::-webkit-scrollbar-thumb {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 10px;
    }
    
    .container {
      max-width: 1400px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }
    
    /* ========== HEADER ========== */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.2rem 2rem;
      background: rgba(30, 27, 75, 0.5);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-radius: var(--radius-xl);
      border: 1px solid var(--border-color);
      margin-bottom: 1.8rem;
      box-shadow: var(--shadow-lg);
      animation: fadeIn 0.5s ease;
      flex-wrap: wrap;
      gap: 1rem;
    }
    
    .header-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    
    .logo-icon {
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border-radius: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      color: white;
      box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3);
    }
    
    h1 {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #c4b5fd 0%, #ede9fe 50%, #c4b5fd 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: shimmer 3s ease infinite;
    }
    
    .header-right {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      flex-wrap: wrap;
    }
    
    .btn {
      padding: 0.6rem 1.3rem;
      border-radius: 40px;
      border: 1px solid var(--border-color);
      background: rgba(76, 29, 149, 0.2);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: var(--text-primary);
      cursor: pointer;
      font-weight: 600;
      font-size: 0.85rem;
      transition: all var(--transition-normal);
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
      white-space: nowrap;
      font-family: inherit;
      position: relative;
      overflow: hidden;
    }
    
    .btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.08), transparent);
      transition: left 0.5s;
    }
    
    .btn:hover::before {
      left: 100%;
    }
    
    .btn:hover {
      background: rgba(139, 92, 246, 0.3);
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(139, 92, 246, 0.25);
      border-color: rgba(139, 92, 246, 0.5);
    }
    
    .btn:active {
      transform: translateY(0);
    }
    
    .btn-primary {
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.6), rgba(109, 40, 217, 0.7));
      border-color: rgba(139, 92, 246, 0.5);
      font-weight: 700;
    }
    
    .btn-primary:hover {
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.8), rgba(109, 40, 217, 0.9));
      box-shadow: 0 8px 30px rgba(139, 92, 246, 0.4);
    }
    
    .btn-success {
      background: rgba(16, 185, 129, 0.3);
      border-color: rgba(16, 185, 129, 0.5);
    }
    
    .btn-success:hover {
      background: rgba(16, 185, 129, 0.5);
      box-shadow: 0 8px 25px rgba(16, 185, 129, 0.3);
    }
    
    .btn-danger {
      background: rgba(239, 68, 68, 0.3);
      border-color: rgba(239, 68, 68, 0.5);
    }
    
    .btn-danger:hover {
      background: rgba(239, 68, 68, 0.5);
      box-shadow: 0 8px 25px rgba(239, 68, 68, 0.3);
    }
    
    .btn-warning {
      background: rgba(245, 158, 11, 0.3);
      border-color: rgba(245, 158, 11, 0.5);
    }
    
    .btn-code {
      background: rgba(59, 130, 246, 0.3);
      border-color: rgba(59, 130, 246, 0.5);
    }
    
    .btn-code:hover {
      background: rgba(59, 130, 246, 0.5);
      box-shadow: 0 8px 25px rgba(59, 130, 246, 0.3);
    }
    
    .btn-google {
      background: rgba(234, 67, 53, 0.3) !important;
      border-color: rgba(234, 67, 53, 0.5) !important;
    }
    
    .btn-sm {
      padding: 0.4rem 0.9rem;
      font-size: 0.78rem;
      border-radius: 30px;
    }
    
    .btn-icon {
      width: 38px;
      height: 38px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      flex-shrink: 0;
    }
    
    .btn-icon i {
      margin: 0;
    }
    
    .user-badge {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 1rem;
      background: rgba(139, 92, 246, 0.2);
      border-radius: 30px;
      border: 1px solid var(--border-color);
      font-size: 0.85rem;
      color: var(--text-secondary);
    }
    
    .detected-os {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0.4rem 1rem;
      background: rgba(139, 92, 246, 0.2);
      border-radius: 30px;
      font-size: 0.85rem;
      color: var(--text-secondary);
      border: 1px solid var(--border-color);
    }
    
    .detected-os i {
      font-size: 1rem;
    }
    
    /* ========== OS BADGES ========== */
    .os-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .os-windows { background: rgba(0, 120, 215, 0.3); color: #6eb5ff; border: 1px solid rgba(0, 120, 215, 0.5); }
    .os-macos { background: rgba(100, 100, 100, 0.3); color: #cecece; border: 1px solid rgba(100, 100, 100, 0.5); }
    .os-linux { background: rgba(240, 147, 0, 0.3); color: #ffb86b; border: 1px solid rgba(240, 147, 0, 0.5); }
    .os-cross { background: rgba(139, 92, 246, 0.3); color: #c4b5fd; border: 1px solid rgba(139, 92, 246, 0.5); }
    .os-android { background: rgba(61, 220, 132, 0.3); color: #a4f0c8; border: 1px solid rgba(61, 220, 132, 0.5); }
    .os-ios { background: rgba(0, 122, 255, 0.3); color: #7ab8ff; border: 1px solid rgba(0, 122, 255, 0.5); }
    
    /* ========== SEARCH ========== */
    .search-container {
      position: relative;
      margin-bottom: 1.5rem;
    }
    
    .search-input {
      width: 100%;
      padding: 0.9rem 1.5rem 0.9rem 3.2rem;
      border-radius: 40px;
      border: 1px solid var(--border-color);
      background: var(--bg-card);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      color: var(--text-primary);
      font-size: 0.95rem;
      font-family: inherit;
      transition: all var(--transition-normal);
    }
    
    .search-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 25px rgba(139, 92, 246, 0.25);
      background: rgba(30, 27, 75, 0.6);
    }
    
    .search-input::placeholder {
      color: rgba(167, 139, 250, 0.5);
    }
    
    .search-icon {
      position: absolute;
      left: 1.2rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 1.1rem;
      pointer-events: none;
    }
    
    .search-clear {
      position: absolute;
      right: 1.2rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1.1rem;
      display: none;
      padding: 5px;
      border-radius: 50%;
      transition: all var(--transition-fast);
    }
    
    .search-clear:hover {
      color: var(--text-primary);
      background: rgba(139, 92, 246, 0.2);
    }
    
    .search-clear.visible {
      display: block;
    }
    
    /* ========== DEPARTMENTS ========== */
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 2rem 0 1.2rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    
    h2 {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    
    h2 i {
      color: var(--primary-light);
    }
    
    .departments-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      margin-bottom: 1.5rem;
    }
    
    .dept-card {
      padding: 0.8rem 1.5rem;
      background: var(--bg-card);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border-radius: var(--radius-md);
      border: 1px solid var(--border-color);
      color: var(--text-secondary);
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all var(--transition-normal);
      display: flex;
      align-items: center;
      gap: 0.6rem;
      position: relative;
      user-select: none;
      animation: fadeInUp 0.4s ease;
    }
    
    .dept-card:hover {
      background: rgba(139, 92, 246, 0.3);
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }
    
    .dept-card.active {
      border: 2px solid var(--primary);
      background: rgba(139, 92, 246, 0.35);
      box-shadow: var(--shadow-glow);
    }
    
    .dept-card .dept-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: rgba(139, 92, 246, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
    }
    
    .dept-card .dept-count {
      background: rgba(139, 92, 246, 0.3);
      padding: 2px 8px;
      border-radius: 15px;
      font-size: 0.75rem;
      font-weight: 700;
      margin-left: auto;
    }
    
    /* ========== SOFTWARE SECTION ========== */
    .software-section {
      background: rgba(30, 27, 75, 0.2);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border-radius: var(--radius-lg);
      padding: 1.8rem;
      border: 1px solid var(--border-color);
      box-shadow: var(--shadow-lg);
    }
    
    .software-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(370px, 1fr));
      gap: 1.3rem;
      margin-top: 1.2rem;
    }
    
    .software-card {
      background: var(--bg-card);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border-radius: 22px;
      padding: 1.3rem;
      border: 1px solid var(--border-color);
      transition: all var(--transition-normal);
      position: relative;
      animation: fadeInUp 0.4s ease;
      display: flex;
      flex-direction: column;
    }
    
    .software-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 40px rgba(139, 92, 246, 0.2);
      border-color: rgba(139, 92, 246, 0.5);
    }
    
    .software-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 0.8rem;
    }
    
    .software-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.4), rgba(109, 40, 217, 0.4));
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      color: var(--text-secondary);
      border: 2px solid rgba(139, 92, 246, 0.4);
      overflow: hidden;
      flex-shrink: 0;
      cursor: pointer;
      transition: all var(--transition-normal);
    }
    
    .software-icon:hover {
      transform: scale(1.05);
      border-color: var(--primary);
      box-shadow: 0 0 20px rgba(139, 92, 246, 0.4);
    }
    
    .software-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 12px;
    }
    
    .software-info {
      flex: 1;
      min-width: 0;
    }
    
    .software-name {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
    }
    
    .software-version {
      color: var(--text-muted);
      font-size: 0.8rem;
      font-weight: 500;
    }
    
    .software-preview {
      width: 100%;
      height: 160px;
      background: rgba(17, 24, 39, 0.5);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0.8rem 0;
      border: 1px solid rgba(139, 92, 246, 0.2);
      overflow: hidden;
      cursor: pointer;
      position: relative;
      transition: all var(--transition-normal);
    }
    
    .software-preview:hover {
      border-color: var(--primary);
      box-shadow: 0 0 25px rgba(139, 92, 246, 0.3);
    }
    
    .software-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform var(--transition-slow);
    }
    
    .software-preview:hover img {
      transform: scale(1.05);
    }
    
    .preview-placeholder {
      color: var(--text-muted);
      font-size: 3rem;
      opacity: 0.4;
    }
    
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 0.25rem 0.7rem;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
    }
    
    .status-working { background: rgba(16, 185, 129, 0.3); color: #6ee7b7; }
    .status-stable { background: rgba(59, 130, 246, 0.3); color: #93c5fd; }
    .status-beta { background: rgba(245, 158, 11, 0.3); color: #fcd34d; }
    .status-discontinued { background: rgba(239, 68, 68, 0.3); color: #fca5a5; }
    .status-down { background: rgba(107, 114, 128, 0.3); color: #d1d5db; }
    
    .dates-info {
      font-size: 0.73rem;
      color: var(--text-muted);
      margin: 0.4rem 0;
    }
    
    .software-description {
      color: #cbd5e1;
      font-size: 0.82rem;
      line-height: 1.4;
      margin: 0.4rem 0;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    
    .like-section {
      display: flex;
      gap: 0.6rem;
      align-items: center;
      margin: 0.6rem 0;
    }
    
    .like-btn, .dislike-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 0.35rem 0.8rem;
      border-radius: 20px;
      border: 1px solid rgba(139, 92, 246, 0.3);
      background: rgba(76, 29, 149, 0.2);
      color: var(--text-primary);
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
      transition: all var(--transition-fast);
      font-family: inherit;
    }
    
    .like-btn:hover {
      background: rgba(16, 185, 129, 0.3);
      border-color: rgba(16, 185, 129, 0.5);
    }
    
    .dislike-btn:hover {
      background: rgba(239, 68, 68, 0.3);
      border-color: rgba(239, 68, 68, 0.5);
    }
    
    .like-btn.liked {
      background: rgba(16, 185, 129, 0.4) !important;
      border-color: var(--success) !important;
      animation: bounceIn 0.5s ease;
    }
    
    .dislike-btn.disliked {
      background: rgba(239, 68, 68, 0.4) !important;
      border-color: var(--danger) !important;
    }
    
    .comment-section {
      margin-top: 0.5rem;
      border-top: 1px solid rgba(139, 92, 246, 0.15);
      padding-top: 0.7rem;
    }
    
    .comment {
      background: rgba(20, 10, 40, 0.3);
      padding: 0.6rem 0.8rem;
      border-radius: 12px;
      margin-bottom: 0.4rem;
      font-size: 0.8rem;
    }
    
    .comment-user {
      color: var(--text-muted);
      font-weight: 600;
      margin-bottom: 0.2rem;
      font-size: 0.75rem;
    }
    
    .comment-text {
      color: #cbd5e1;
    }
    
    .comment-input {
      display: flex;
      gap: 0.4rem;
      margin-top: 0.4rem;
    }
    
    .comment-input input {
      flex: 1;
      padding: 0.5rem 0.8rem;
      border-radius: 20px;
      border: 1px solid rgba(139, 92, 246, 0.3);
      background: rgba(17, 24, 39, 0.6);
      color: var(--text-primary);
      font-size: 0.8rem;
      font-family: inherit;
    }
    
    .comment-input input:focus {
      outline: none;
      border-color: var(--primary);
    }
    
    .software-actions {
      display: flex;
      gap: 0.4rem;
      margin-top: auto;
      padding-top: 0.8rem;
    }
    
    .software-actions .btn {
      flex: 1;
      text-align: center;
      justify-content: center;
    }
    
    /* ========== MODALS ========== */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.25s ease;
    }
    
    .modal {
      background: rgba(30, 27, 75, 0.97);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      padding: 2rem;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-color);
      max-width: 600px;
      width: 95%;
      max-height: 88vh;
      overflow-y: auto;
      color: var(--text-primary);

      font-size: 0.85rem;

    .input-group select:focus,

      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 15px rgba(139, 92, 246, 0.2);
    }
    
    .input-group select option {
      background: #1a1530;
      color: var(--text-primary);
    }
    
    .file-upload {
      border: 2px dashed rgba(139, 92, 246, 0.4);
      border-radius: var(--radius-sm);
      padding: 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: all var(--transition-fast);
      background: rgba(17, 24, 39, 0.3);

    .file-upload i {
      font-size: 2rem;

    }
    
    .modal-actions {
      display: flex;
      gap: 0.8rem;
      justify-content: flex-end;
      margin-top: 1.5rem;
      flex-wrap: wrap;
    }

      display: flex;

      flex-wrap: wrap;

      flex: 1;

      border: 1px solid rgba(139, 92, 246, 0.4);

      transition: all var(--transition-normal);
      text-align: center;
      font-size: 0.75rem;
      font-weight: 500;

      background: rgba(139, 92, 246, 0.4);

    /* ========== SETTINGS ========== */

      right: 25px;

      background: rgba(30, 27, 75, 0.97);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border-radius: var(--radius-md);
      padding: 1.5rem;
      border: 1px solid var(--border-color);
      z-index: 99;
      transform: translateX(350px);
      transition: transform var(--transition-normal);
      color: var(--text-primary);
      box-shadow: var(--shadow-lg);
    }
    
    .settings-panel.open {
      transform: translateX(0);
    }
    
    .settings-panel h3 {
      color: var(--text-secondary);
      margin-bottom: 1.2rem;
      font-size: 1.1rem;
    }
    
    .setting-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
      padding: 0.5rem 0;
      border-bottom: 1px solid rgba(139, 92, 246, 0.1);
    }
    
    .setting-item label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 500;
      font-size: 0.9rem;
    }
    
    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 26px;
      flex-shrink: 0;
    }
    
    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    
    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(76, 29, 149, 0.5);
      transition: var(--transition-normal);
      border-radius: 26px;
      border: 1px solid rgba(139, 92, 246, 0.5);
    }
    
    .toggle-slider:before {
      position: absolute;
      content: "";
      height: 20px;
      width: 20px;
      left: 2px;
      bottom: 2px;
      background: linear-gradient(135deg, var(--text-secondary), var(--text-primary));
      transition: var(--transition-normal);
      border-radius: 50%;
    }
    
    input:checked + .toggle-slider {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    }
    
    input:checked + .toggle-slider:before {
      transform: translateX(24px);
    }
    
    /* ========== TOAST ========== */
    .toast {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 0.9rem 1.4rem;
      border-radius: var(--radius-sm);
      background: rgba(30, 27, 75, 0.97);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      z-index: 1000;
      animation: slideIn 0.3s ease, fadeOut 0.3s ease 2.5s forwards;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-weight: 500;
      font-size: 0.9rem;
      box-shadow: var(--shadow-lg);
    }
    
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    
    @keyframes fadeOut {
      to { opacity: 0; transform: translateX(50px); }
    }
    
    .hidden { display: none !important; }
    .empty-message {
      text-align: center;
      padding: 3rem;
      color: var(--text-muted);
      grid-column: 1 / -1;
    }
    
    .empty-message i {

    }

    }

    @media (max-width: 768px) {
      body { padding: 0.8rem; }
      .header { padding: 1rem; border-radius: var(--radius-lg); }
      h1 { font-size: 1.4rem; }
      .software-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

<script type="module">
  // ============ IMPORTS ============
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
  import { 
    getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, 
    onSnapshot, query, orderBy, serverTimestamp, increment, 
    arrayUnion, arrayRemove 
  } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
  import { 
    getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, 
    GoogleAuthProvider, signInWithPopup 
  } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

  // ============ FIREBASE CONFIG ============
  const firebaseConfig = {
    apiKey: "AIzaSyDjXg0y3vnuk8L7xBh9d_W80kzmWjilheo",
    authDomain: "software-lzw.firebaseapp.com",
    projectId: "software-lzw",
    storageBucket: "software-lzw.appspot.com",
    messagingSenderId: "115286936457",
    appId: "1:115286936457:web:2f0d6be270bd4e3717ef58"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);
  const googleProvider = new GoogleAuthProvider();
  
  const ADMIN_EMAIL = 'lzhenwei.dev@gmail.com';

  // ============ OS DETECTION ============
  function detectOS() {
    const ua = window.navigator.userAgent.toLowerCase();
    const platform = window.navigator.platform.toLowerCase();
    if (/win/.test(platform) || /win/.test(ua)) return 'windows';
    if (/mac/.test(platform) || /mac/.test(ua)) return 'macos';
    if (/linux/.test(platform) || /linux/.test(ua)) return 'linux';
    return 'unknown';
  }

  const detectedOS = detectOS();
  const osNames = { windows: 'Windows', macos: 'macOS', linux: 'Linux', unknown: 'Unbekannt', cross: 'Cross-Platform' };
  const osIcons = { windows: 'fab fa-windows', macos: 'fab fa-apple', linux: 'fab fa-linux', unknown: 'fas fa-question', cross: 'fas fa-globe' };

  // ============ STATE ============
  let departments = [];
  let software = [];
  let currentUser = null;
  let selectedDeptId = null;
  let showDownloadCount = false;
  let showCompatibleOnly = false;
  let searchQuery = '';
  let pendingDownload = null;

  // ============ UTILITY FUNCTIONS ============
  function isAdmin() {
    return currentUser && currentUser.email === ADMIN_EMAIL;
  }

  function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  function getRelativeTime(ts) {
    if (!ts) return '';
    const date = ts?.toDate ? ts.toDate() : new Date(ts);
    const diff = Math.floor((new Date() - date) / 1000);
    if (diff < 60) return `vor ${diff}s`;
    if (diff < 3600) return `vor ${Math.floor(diff/60)}min`;
    if (diff < 86400) return `vor ${Math.floor(diff/3600)}h`;
    if (diff < 604800) return `vor ${Math.floor(diff/86400)}d`;
    return date.toLocaleDateString('de-DE');
  }

  function checkOS(swOS) {
    if (swOS === 'cross' || detectedOS === 'unknown') return true;
    return swOS === detectedOS;
  }

  function showToast(message, type = 'info') {
    const icons = { success: 'check-circle', error: 'times-circle', warning: 'exclamation-triangle', info: 'info-circle' };
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerHTML = `<i class="fas fa-${icons[type] || icons.info}"></i> ${escapeHtml(message)}`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2800);
  }

  // ============ AUTH STATE ============
  onAuthStateChanged(auth, (user) => {
    currentUser = user;
    document.getElementById('userEmailDisplay').textContent = user ? user.email.split('@')[0] : 'Gast';
    document.getElementById('loginBtn').classList.toggle('hidden', !!user);
    document.getElementById('logoutBtn').classList.toggle('hidden', !user);
    
    const admin = isAdmin();
    document.getElementById('addDeptBtn').classList.toggle('hidden', !admin);
    document.getElementById('addSoftwareBtn').classList.toggle('hidden', !admin);
    document.getElementById('settingsBtn').classList.toggle('hidden', !admin);
    
    loadData();
  });

  // ============ LOGIN/LOGOUT ============
  document.getElementById('loginBtn').addEventListener('click', () => {
    document.getElementById('loginModal').classList.remove('hidden');
    document.getElementById('loginError').textContent = '';
  });

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await signOut(auth);
    showToast('Abgemeldet 👋', 'info');
  });

  document.getElementById('cancelLoginBtn').addEventListener('click', () => {
    document.getElementById('loginModal').classList.add('hidden');
  });

  document.getElementById('submitLoginBtn').addEventListener('click', async () => {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    if (!email || !password) {
      document.getElementById('loginError').textContent = 'Bitte E-Mail und Passwort eingeben';
      return;
    }
    try {
      await signInWithEmailAndPassword(auth, email, password);
      document.getElementById('loginModal').classList.add('hidden');
      showToast('Erfolgreich angemeldet! 👋', 'success');
    } catch (error) {
      document.getElementById('loginError').textContent = error.code === 'auth/invalid-credential' ? 'Ungültige Anmeldedaten' : error.message;
    }
  });

  document.getElementById('googleLoginBtn').addEventListener('click', async () => {
    try {
      await signInWithPopup(auth, googleProvider);
      document.getElementById('loginModal').classList.add('hidden');
      showToast('Mit Google angemeldet! 🎉', 'success');
    } catch (error) {
      document.getElementById('loginError').textContent = 'Google-Anmeldung fehlgeschlagen';
    }
  });

  // ============ LOAD DATA ============
  function loadData() {
    onSnapshot(collection(db, "departments"), (snap) => {
      departments = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderDepartments();
    });

    const q = query(collection(db, "software"), orderBy("lastUpdated", "desc"));
    onSnapshot(q, (snap) => {
      software = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderSoftware();
    });
  }

  // ============ RENDER DEPARTMENTS ============
  function renderDepartments() {
    const container = document.getElementById('departmentsContainer');
    
    let html = `<div class="dept-card ${!selectedDeptId ? 'active' : ''}" data-dept="all">
      <div class="dept-icon"><i class="fas fa-border-all"></i></div>
      <span>Alle</span>
      <span class="dept-count">${software.length}</span>
    </div>`;

    departments.forEach(dept => {
      const count = software.filter(s => s.department === dept.id).length;
      html += `<div class="dept-card ${selectedDeptId === dept.id ? 'active' : ''}" data-dept="${dept.id}">
        <div class="dept-icon"><i class="${dept.icon || 'fas fa-folder'}"></i></div>
        <span>${escapeHtml(dept.name)}</span>
        <span class="dept-count">${count}</span>
      </div>`;
    });

    container.innerHTML = html;

    container.querySelectorAll('.dept-card').forEach(card => {
      card.addEventListener('click', () => {
        selectedDeptId = card.dataset.dept === 'all' ? null : card.dataset.dept;
        const dept = departments.find(d => d.id === selectedDeptId);
        document.getElementById('currentDeptTitle').innerHTML = dept 
          ? `<i class="${dept.icon || 'fas fa-folder'}"></i> ${escapeHtml(dept.name)}`
          : '<i class="fas fa-cube"></i> Alle Software';
        renderDepartments();
        renderSoftware();
      });

      if (isAdmin() && card.dataset.dept !== 'all') {
        card.addEventListener('dblclick', () => {
          const dept = departments.find(d => d.id === card.dataset.dept);
          if (dept) openDeptModal(dept);
        });
      }
    });
  }

  // ============ RENDER SOFTWARE ============
  function renderSoftware() {
    const container = document.getElementById('softwareContainer');
    
    let filtered = [...software];
    
    if (selectedDeptId) {
      filtered = filtered.filter(s => s.department === selectedDeptId);
    }
    
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      filtered = filtered.filter(s => 
        (s.name || '').toLowerCase().includes(q) ||
        (s.description || '').toLowerCase().includes(q) ||
        (s.version || '').toLowerCase().includes(q)
      );
    }
    
    if (showCompatibleOnly) {
      filtered = filtered.filter(s => checkOS(s.os));
    }

    if (filtered.length === 0) {
      container.innerHTML = `<div class="empty-message">
        <i class="fas fa-search"></i>
        <p>Keine Software gefunden</p>
      </div>`;
      return;
    }

    container.innerHTML = filtered.map(sw => {
      const likes = sw.likes || [];
      const dislikes = sw.dislikes || [];
      const comments = sw.comments || [];
      const isLiked = currentUser ? likes.includes(currentUser.uid) : false;
      const isDisliked = currentUser ? dislikes.includes(currentUser.uid) : false;
      const compatible = checkOS(sw.os);

      return `
        <div class="software-card" data-swid="${sw.id}">
          <div class="software-header">
            <div class="software-icon" onclick="window._openImage('${escapeHtml(sw.icon || '')}')">
              ${sw.icon ? `<img src="${escapeHtml(sw.icon)}" alt="">` : '<i class="fas fa-cube"></i>'}
            </div>
            <div class="software-info">
              <div class="software-name">
                ${escapeHtml(sw.name)}
                <span class="os-badge os-${sw.os}"><i class="${osIcons[sw.os] || 'fas fa-question'}"></i> ${osNames[sw.os] || sw.os}</span>
                ${!compatible ? '<span style="font-size:0.7rem;color:#fca5a5;">⚠️</span>' : ''}
              </div>
              <div class="software-version">v${escapeHtml(sw.version || '1.0.0')}</div>
            </div>
          </div>
          
          ${sw.previewImage ? `
            <div class="software-preview" onclick="window._openImage('${escapeHtml(sw.previewImage)}')">
              <img src="${escapeHtml(sw.previewImage)}" alt="Preview">
            </div>
          ` : `
            <div class="software-preview">
              <i class="fas fa-image preview-placeholder"></i>
            </div>
          `}
          
          <span class="status-badge status-${sw.status || 'working'}">${sw.status || 'working'}</span>
          
          <div class="dates-info">
            <i class="far fa-clock"></i> ${getRelativeTime(sw.createdAt)}
            ${sw.lastUpdated ? ` · Aktualisiert: ${getRelativeTime(sw.lastUpdated)}` : ''}
          </div>
          
          ${showDownloadCount && sw.downloads ? `
            <div style="font-size:0.78rem;color:#6ee7b7;"><i class="fas fa-download"></i> ${sw.downloads} Downloads</div>
          ` : ''}
          
          ${sw.description ? `<div class="software-description">${escapeHtml(sw.description)}</div>` : ''}
          
          <div class="like-section">
            <button class="like-btn ${isLiked ? 'liked' : ''}" data-action="like" data-swid="${sw.id}">
              <i class="far fa-thumbs-up"></i> ${likes.length}
            </button>
            <button class="dislike-btn ${isDisliked ? 'disliked' : ''}" data-action="dislike" data-swid="${sw.id}">
              <i class="far fa-thumbs-down"></i> ${dislikes.length}
            </button>
          </div>
          
          <div class="comment-section">
            ${comments.slice(-2).map(c => `
              <div class="comment">
                <div class="comment-user">${escapeHtml((c.user || '?').split('@')[0])}</div>
                <div class="comment-text">${escapeHtml(c.text)}</div>
              </div>
            `).join('')}
            
            <div class="comment-input">
              <input type="text" placeholder="Kommentar..." data-swid="${sw.id}" class="comment-field">
              <button class="btn btn-icon btn-sm" data-action="comment" data-swid="${sw.id}" title="Senden">
                <i class="fas fa-paper-plane"></i>
              </button>
            </div>
          </div>
          
          <div class="software-actions">
            <button class="btn btn-primary btn-sm" data-action="download" data-swid="${sw.id}">
              <i class="fas fa-download"></i> Download
            </button>
            ${isAdmin() ? `
              <button class="btn btn-icon btn-sm" data-action="edit" data-swid="${sw.id}" title="Bearbeiten">
                <i class="fas fa-edit"></i>
              </button>
            ` : ''}
          </div>
        </div>
      `;
    }).join('');

    // Attach event listeners
    attachSoftwareListeners(container);
  }

  function attachSoftwareListeners(container) {
    container.querySelectorAll('[data-action="like"]').forEach(btn => {
      btn.addEventListener('click', () => toggleLike(btn.dataset.swid));
    });

    container.querySelectorAll('[data-action="dislike"]').forEach(btn => {
      btn.addEventListener('click', () => toggleDislike(btn.dataset.swid));
    });

    container.querySelectorAll('[data-action="comment"]').forEach(btn => {
      btn.addEventListener('click', () => {
        const input = container.querySelector(`.comment-field[data-swid="${btn.dataset.swid}"]`);
        if (input && input.value.trim()) {
          addComment(btn.dataset.swid, input.value.trim());
          input.value = '';
        }
      });
    });

    container.querySelectorAll('.comment-field').forEach(input => {
      input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && input.value.trim()) {
          addComment(input.dataset.swid, input.value.trim());
          input.value = '';
        }
      });
    });

    container.querySelectorAll('[data-action="download"]').forEach(btn => {
      btn.addEventListener('click', () => handleDownload(btn.dataset.swid));
    });

    container.querySelectorAll('[data-action="edit"]').forEach(btn => {
      btn.addEventListener('click', () => {
        const sw = software.find(s => s.id === btn.dataset.swid);
        if (sw) openSoftwareModal(sw);
      });
    });
  }

  // ============ LIKE/DISLIKE/COMMENT ============
  async function toggleLike(swId) {
    if (!currentUser) {
      showToast('Bitte anmelden zum Liken', 'warning');
      return;
    }
    const swRef = doc(db, "software", swId);
    const sw = software.find(s => s.id === swId);
    if (!sw) return;
    const likes = sw.likes || [];
    const uid = currentUser.uid;
    
    if (likes.includes(uid)) {
      await updateDoc(swRef, { likes: arrayRemove(uid) });
    } else {
      await updateDoc(swRef, { likes: arrayUnion(uid), dislikes: arrayRemove(uid) });
    }
  }

  async function toggleDislike(swId) {
    if (!currentUser) {
      showToast('Bitte anmelden zum Disliken', 'warning');
      return;
    }
    const swRef = doc(db, "software", swId);
    const sw = software.find(s => s.id === swId);
    if (!sw) return;
    const dislikes = sw.dislikes || [];
    const uid = currentUser.uid;
    
    if (dislikes.includes(uid)) {
      await updateDoc(swRef, { dislikes: arrayRemove(uid) });
    } else {
      await updateDoc(swRef, { dislikes: arrayUnion(uid), likes: arrayRemove(uid) });
    }
  }

  async function addComment(swId, text) {
    if (!currentUser) {
      showToast('Bitte anmelden zum Kommentieren', 'warning');
      return;
    }
    const swRef = doc(db, "software", swId);
    await updateDoc(swRef, {
      comments: arrayUnion({
        user: currentUser.email,
        uid: currentUser.uid,
        text: text,
        createdAt: new Date().toISOString()
      })
    });
  }

  async function handleDownload(swId) {
    const sw = software.find(s => s.id === swId);
    if (!sw) return;
    
    if (!checkOS(sw.os)) {
      pendingDownload = sw;
      document.getElementById('warningMessage').textContent = 
        `Diese Software ist für ${osNames[sw.os]} optimiert, du verwendest ${osNames[detectedOS]}.`;
      document.getElementById('osMismatchInfo').innerHTML = `
        <div style="display:flex;align-items:center;gap:1rem;justify-content:center;">
          <div><i class="${osIcons[sw.os]}" style="font-size:2rem;"></i><br>${osNames[sw.os]}</div>
          <i class="fas fa-arrow-right"></i>
          <div><i class="${osIcons[detectedOS]}" style="font-size:2rem;"></i><br>${osNames[detectedOS]}</div>
        </div>`;
      document.getElementById('osWarningModal').classList.remove('hidden');
      return;
    }
    
    await updateDoc(doc(db, "software", swId), { downloads: increment(1) });
    window.open(sw.link, '_blank', 'noopener,noreferrer');
    showToast('Download gestartet! 📥', 'success');
  }

  document.getElementById('cancelWarningBtn').addEventListener('click', () => {
    document.getElementById('osWarningModal').classList.add('hidden');
    pendingDownload = null;
  });

  document.getElementById('forceDownloadBtn').addEventListener('click', async () => {
    document.getElementById('osWarningModal').classList.add('hidden');
    if (pendingDownload) {
      await updateDoc(doc(db, "software", pendingDownload.id), { downloads: increment(1) });
      window.open(pendingDownload.link, '_blank', 'noopener,noreferrer');
      pendingDownload = null;
    }
  });

  // ============ IMAGE MODAL ============
  window._openImage = function(src) {
    if (!src) return;
    document.getElementById('fullImage').src = src;
    document.getElementById('imageModal').classList.remove('hidden');
  };

  document.getElementById('closeImageBtn').addEventListener('click', () => {
    document.getElementById('imageModal').classList.add('hidden');
  });

  document.getElementById('imageModal').addEventListener('click', function(e) {
    if (e.target === this) this.classList.add('hidden');
  });

  // ============ SOFTWARE MODAL ============
  document.getElementById('addSoftwareBtn').addEventListener('click', () => openSoftwareModal());

  function openSoftwareModal(sw = null) {
    document.getElementById('editSwId').value = sw ? sw.id : '';
    document.getElementById('modalTitle').innerHTML = sw 
      ? '<i class="fas fa-edit"></i> Software bearbeiten' 
      : '<i class="fas fa-plus-circle"></i> Software hinzufügen';
    document.getElementById('swName').value = sw ? (sw.name || '') : '';
    document.getElementById('swVersion').value = sw ? (sw.version || '1.0.0') : '1.0.0';
    document.getElementById('swLink').value = sw ? (sw.link || '') : '';
    document.getElementById('swStatus').value = sw ? (sw.status || 'working') : 'working';
    document.getElementById('swDescription').value = sw ? (sw.description || '') : '';
    
    // OS
    const osSelector = document.getElementById('osSelector');
    osSelector.querySelectorAll('.os-option').forEach(opt => {
      opt.classList.toggle('selected', opt.dataset.os === (sw ? sw.os : 'windows'));
    });
    document.getElementById('swOS').value = sw ? sw.os : 'windows';
    
    // Department
    const deptSelect = document.getElementById('swDepartment');
    deptSelect.innerHTML = '<option value="">Keine Abteilung</option>' + 
      departments.map(d => `<option value="${d.id}" ${sw && sw.department === d.id ? 'selected' : ''}>${escapeHtml(d.name)}</option>`).join('');
    
    // Icon
    document.getElementById('iconPreview').innerHTML = sw && sw.icon ? 
      `<img src="${escapeHtml(sw.icon)}" alt="Icon">` : '';
    document.getElementById('removeIconBtn').classList.toggle('hidden', !sw || !sw.icon);
    
    // Preview
    document.getElementById('previewImagePreview').innerHTML = sw && sw.previewImage ? 
      `<img src="${escapeHtml(sw.previewImage)}" alt="Preview">` : '';
    document.getElementById('removePreviewBtn').classList.toggle('hidden', !sw || !sw.previewImage);
    
    document.getElementById('deleteSwBtn').classList.toggle('hidden', !sw);
    document.getElementById('softwareModal').classList.remove('hidden');
  }

  document.getElementById('cancelSwBtn').addEventListener('click', () => {
    document.getElementById('softwareModal').classList.add('hidden');
  });

  // OS Selector
  document.getElementById('osSelector').addEventListener('click', (e) => {
    const opt = e.target.closest('.os-option');
    if (!opt) return;
    document.querySelectorAll('#osSelector .os-option').forEach(o => o.classList.remove('selected'));
    opt.classList.add('selected');
    document.getElementById('swOS').value = opt.dataset.os;
  });

  // Icon upload
  document.getElementById('iconUploadArea').addEventListener('click', () => document.getElementById('iconFileInput').click());
  document.getElementById('iconFileInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function() {
      document.getElementById('iconPreview').innerHTML = `<img src="${reader.result}" alt="Icon">`;
      document.getElementById('removeIconBtn').classList.remove('hidden');
    };
    reader.readAsDataURL(file);
  });
  document.getElementById('removeIconBtn').addEventListener('click', () => {
    document.getElementById('iconPreview').innerHTML = '';
    document.getElementById('iconFileInput').value = '';
    document.getElementById('removeIconBtn').classList.add('hidden');
  });

  // Preview upload
  document.getElementById('previewUploadArea').addEventListener('click', () => document.getElementById('previewFileInput').click());
  document.getElementById('previewFileInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function() {
      document.getElementById('previewImagePreview').innerHTML = `<img src="${reader.result}" alt="Preview">`;
      document.getElementById('removePreviewBtn').classList.remove('hidden');
    };
    reader.readAsDataURL(file);
  });
  document.getElementById('removePreviewBtn').addEventListener('click', () => {
    document.getElementById('previewImagePreview').innerHTML = '';
    document.getElementById('previewFileInput').value = '';
    document.getElementById('removePreviewBtn').classList.add('hidden');
  });

  // Save software
  document.getElementById('saveSwBtn').addEventListener('click', async () => {
    const id = document.getElementById('editSwId').value;
    const name = document.getElementById('swName').value.trim();
    const link = document.getElementById('swLink').value.trim();
    const os = document.getElementById('swOS').value;
    
    if (!name || !link || !os) {
      showToast('Name, Link und OS sind erforderlich!', 'warning');
      return;
    }
    
    const iconImg = document.getElementById('iconPreview').querySelector('img');
    const previewImg = document.getElementById('previewImagePreview').querySelector('img');
    
    const data = {
      name,
      version: document.getElementById('swVersion').value.trim() || '1.0.0',
      os,
      link,
      status: document.getElementById('swStatus').value,
      department: document.getElementById('swDepartment').value || null,
      icon: iconImg ? iconImg.src : null,
      previewImage: previewImg ? previewImg.src : null,
      description: document.getElementById('swDescription').value.trim(),
      lastUpdated: serverTimestamp()
    };
    
    try {
      if (id) {
        await updateDoc(doc(db, "software", id), data);
        showToast('Software aktualisiert! ✅', 'success');
      } else {
        data.createdAt = serverTimestamp();
        data.downloads = 0;
        data.likes = [];
        data.dislikes = [];
        data.comments = [];
        await addDoc(collection(db, "software"), data);
        showToast('Software hinzugefügt! 🎉', 'success');
      }
      document.getElementById('softwareModal').classList.add('hidden');
    } catch (error) {
      showToast('Fehler: ' + error.message, 'error');
    }
  });

  // Delete software
  document.getElementById('deleteSwBtn').addEventListener('click', async () => {
    const id = document.getElementById('editSwId').value;
    if (!id || !confirm('Software wirklich löschen?')) return;
    await deleteDoc(doc(db, "software", id));
    document.getElementById('softwareModal').classList.add('hidden');
    showToast('Software gelöscht 🗑️', 'info');
  });

  // ============ DEPARTMENT MODAL ============
  document.getElementById('addDeptBtn').addEventListener('click', () => openDeptModal());

  function openDeptModal(dept = null) {
    document.getElementById('editDeptId').value = dept ? dept.id : '';
    document.getElementById('deptModalTitle').innerHTML = dept 
      ? '<i class="fas fa-edit"></i> Abteilung bearbeiten' 
      : '<i class="fas fa-plus-circle"></i> Neue Abteilung';
    document.getElementById('deptName').value = dept ? dept.name : '';
    document.getElementById('deptIcon').value = dept ? (dept.icon || 'fas fa-folder') : 'fas fa-folder';
    document.getElementById('deleteDeptBtn').classList.toggle('hidden', !dept);
    document.getElementById('deptModal').classList.remove('hidden');
  }

  document.getElementById('cancelDeptBtn').addEventListener('click', () => {
    document.getElementById('deptModal').classList.add('hidden');
  });

  document.getElementById('saveDeptBtn').addEventListener('click', async () => {
    const id = document.getElementById('editDeptId').value;
    const name = document.getElementById('deptName').value.trim();
    if (!name) { showToast('Name erforderlich!', 'warning'); return; }
    
    const data = { name, icon: document.getElementById('deptIcon').value.trim() || 'fas fa-folder' };
    
    try {
      if (id) {
        await updateDoc(doc(db, "departments", id), data);
        showToast('Abteilung aktualisiert! ✅', 'success');
      } else {
        await addDoc(collection(db, "departments"), data);
        showToast('Abteilung erstellt! 📁', 'success');
      }
      document.getElementById('deptModal').classList.add('hidden');
    } catch (error) {
      showToast('Fehler: ' + error.message, 'error');
    }
  });

  document.getElementById('deleteDeptBtn').addEventListener('click', async () => {
    const id = document.getElementById('editDeptId').value;
    if (!id || !confirm('Abteilung und alle zugehörige Software löschen?')) return;
    
    const deptSoftware = software.filter(s => s.department === id);
    for (const sw of deptSoftware) {
      await deleteDoc(doc(db, "software", sw.id));
    }
    await deleteDoc(doc(db, "departments", id));
    document.getElementById('deptModal').classList.add('hidden');
    showToast(`Abteilung und ${deptSoftware.length} Einträge gelöscht`, 'info');
  });

  // ============ SETTINGS ============
  document.getElementById('settingsBtn').addEventListener('click', () => {
    document.getElementById('settingsPanel').classList.toggle('open');
  });

  document.getElementById('closeSettingsBtn').addEventListener('click', () => {
    document.getElementById('settingsPanel').classList.remove('open');
  });

  document.getElementById('showDownloadCountToggle').addEventListener('change', (e) => {
    showDownloadCount = e.target.checked;
    renderSoftware();
  });

  document.getElementById('showCompatibleOnlyToggle').addEventListener('change', (e) => {
    showCompatibleOnly = e.target.checked;
    renderSoftware();
  });

  // ============ SEARCH ============
  const searchInput = document.getElementById('searchInput');
  const searchClearBtn = document.getElementById('searchClearBtn');
  let searchTimeout;

  searchInput.addEventListener('input', (e) => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => {
      searchQuery = e.target.value.trim();
      searchClearBtn.classList.toggle('visible', searchQuery.length > 0);
      renderSoftware();
    }, 300);
  });

  searchClearBtn.addEventListener('click', () => {
    searchInput.value = '';
    searchQuery = '';
    searchClearBtn.classList.remove('visible');
    renderSoftware();
    searchInput.focus();
  });

  // ============ CLOSE MODALS ============
  document.querySelectorAll('.modal-overlay').forEach(overlay => {
    overlay.addEventListener('click', function(e) {
      if (e.target === this) this.classList.add('hidden');
    });
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      document.querySelectorAll('.modal-overlay:not(.hidden)').forEach(m => {
        if (m.id !== 'osWarningModal') m.classList.add('hidden');
      });
    }
  });

  // ============ INIT ============
  document.getElementById('detectedOsDisplay').innerHTML = 
    `<i class="${osIcons[detectedOS]}"></i><span>${osNames[detectedOS]}</span>`;
  loadData();
  console.log('✅ Software Hub bereit!');
  console.log('🔗 Code Hub: https://lzhenweidev.github.io/codehub.html');
</script>

</body>
</html>
